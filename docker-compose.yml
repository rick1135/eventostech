services:
  db:
    image: postgres:16-alpine
    container_name: eventostech-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 325158
      POSTGRES_DB: eventostech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventostech"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventostech-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: eventostech
      DB_USER: postgres
      DB_PASSWORD: 325158
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # interface pra ver o banco sem instalar nada (PgAdmin)
  pgadmin:
    image: dpage/pgadmin4
    container_name: eventostech-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: